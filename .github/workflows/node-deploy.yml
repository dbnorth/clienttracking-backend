name: AWS DEPLOY TO PRODUCTION SERVER
# turn off deploy to AWS

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  aws-deploy:
    runs-on: ubuntu-latest
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PW: ${{ secrets.DB_PASS}}
      DB_USER: ${{ secrets.DB_USER }}
      DB_NAME: ${{ secrets.DB_NAME }}
      CLIENT_DOCUMENTS_ENCRYPTION_KEY: ${{ secrets.CLIENT_DOCUMENTS_ENCRYPTION_KEY }}

      PORT: ${{secrets.PORT}}
      # Optional: set to "true" or "1" in repo Secrets to enable sequelize.sync({ alter: true }) on startup (schema updates). Leave unset for default (no alter).
      SEQUELIZE_SYNC_ALTER: "true"
    steps:
      - uses: actions/checkout@v5
        with:
          ref: dev
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install

      - run: |
          touch .env
          echo DB_HOST = "$DB_HOST" >> .env
          echo DB_PW = "$DB_PW" >> .env
          echo DB_USER = "$DB_USER" >> .env
          echo DB_NAME = "$DB_NAME" >> .env
          echo PORT = "$PORT" >> .env
          echo SEQUELIZE_SYNC_ALTER = "$SEQUELIZE_SYNC_ALTER" >> .env
          echo CLIENT_DOCUMENTS_ENCRYPTION_KEY = "$CLIENT_DOCUMENTS_ENCRYPTION_KEY" >> .env

      - run: npm run bundle

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: "-rltgoDzvO --delete --exclude=uploads"
          SOURCE: "deploy/"
          REMOTE_HOST: "ec2-34-222-213-140.us-west-2.compute.amazonaws.com"
          REMOTE_USER: ubuntu
          TARGET: "nodeapps/clienttracking-backend"
      - name: Execute SSH commmands on remote server
        uses: JimCronqvist/action-ssh@master
        env:
          NAME: "Root"
        with:
          hosts: "ubuntu@ec2-34-222-213-140.us-west-2.compute.amazonaws.com"
          privateKey: ${{ secrets.SERVER_SSH_KEY }}
          debug: false
          command: |
            cd nodeapps/clienttracking-backend
            mkdir -p uploads/organization-logos
            npm install
            sudo systemctl stop clienttracking-backend
            sudo cp clienttracking-backend.service /lib/systemd/system/clienttracking-backend.service
            sudo systemctl daemon-reload
            sudo systemctl start clienttracking-backend
